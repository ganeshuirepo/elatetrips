name: Deploy to EC2

on:
  push:
    branches: [main]
  workflow_dispatch: {} # manual "Run workflow" button

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Frontend — install, typecheck, test
        run: |
          npm ci
          npm run typecheck
          npm run test

      - name: Backend — install, typecheck
        working-directory: elatetrips-node
        run: |
          npm ci
          npm run typecheck

  deploy:
    needs: test
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: SSH into EC2 and run the deploy script
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          command_timeout: 20m
          script: bash ~/elatetrips/deploy/deploy.sh
