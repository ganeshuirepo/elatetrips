# /etc/nginx/sites-available/elatetrips
# One origin for everything: Next.js on /, the API on /api/ — no CORS needed.
server {
    listen 80;
    server_name _;  # replace with your domain when you have one

    # API → Express (:4000). The backend already serves under /api/v1.
    location /api/ {
        proxy_pass http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Swagger docs (optional — remove to keep docs private)
    location /docs {
        proxy_pass http://127.0.0.1:4000;
        proxy_set_header Host $host;
    }

    # Everything else → Next.js (:3000)
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
